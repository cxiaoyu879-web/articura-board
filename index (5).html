<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indonesia Project Board · Articura</title>
<style>
  :root{
    --navy:#1F3864; --mid:#2E5C9E; --ice:#EEF3FA; --gold:#B8860B;
    --ink:#1f2937; --grey:#6b7280; --line:#dbe3ef; --bg:#eef1f5; --card:#fff;
    --p1:#c0392b; --p2:#d97706; --p3:#2E5C9E;
    --done:#16a34a; --prog:#2563eb; --wait:#9ca3af;
    --green:#10b981; --purple:#8b5cf6; --blue:#38bdf8; --red:#f43f5e; --amber:#f59e0b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Segoe UI","Noto Sans SC",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1600px;margin:0 auto;padding:20px 22px 70px}
  header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;border-bottom:3px solid var(--navy);padding-bottom:14px}
  header h1{font-size:23px;color:var(--navy)}
  header .sub{color:var(--grey);font-size:12.5px;margin-top:4px}
  .tabs{display:flex;gap:6px;margin:16px 0 12px;flex-wrap:wrap;align-items:center}
  .tab{padding:8px 16px;border:1px solid var(--line);background:#fff;border-radius:22px;font-size:13px;cursor:pointer;color:var(--grey);user-select:none;transition:.12s}
  .tab:hover{border-color:var(--mid)}
  .tab.on{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:600}
  .view{display:none}.view.show{display:block}

  /* chain legend + controls */
  .chainbar{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin:8px 2px 12px;font-size:12px}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-weight:600;cursor:pointer;user-select:none;border:1.5px solid transparent;transition:.15s}
  .chip .sw{width:11px;height:11px;border-radius:50%}
  .chip.off{opacity:.4}
  .ctrlbtn{margin-left:auto;display:flex;gap:8px}
  .ctrlbtn button{border:1px solid var(--line);background:#fff;border-radius:18px;padding:6px 13px;font-size:12px;cursor:pointer;color:var(--navy)}
  .ctrlbtn button:hover{border-color:var(--mid)}

  .stage{background:radial-gradient(120% 120% at 50% 0%,#12243f 0%,#0c1a30 70%);border:1px solid #16264a;border-radius:16px;padding:8px 8px 4px;overflow-x:auto}
  #liveSvgWrap{width:100%;min-width:1180px}

  /* drawer */
  .drawer{position:fixed;top:0;right:0;width:min(470px,95vw);height:100%;background:#fff;box-shadow:-8px 0 30px rgba(0,0,0,.2);transform:translateX(100%);transition:transform .24s cubic-bezier(.4,0,.2,1);z-index:50;display:flex;flex-direction:column}
  .drawer.open{transform:translateX(0)}
  .dhead{padding:20px 22px;border-bottom:1px solid var(--line);position:relative;background:linear-gradient(#fff,#fafbfd)}
  .dhead h2{font-size:19px;color:var(--navy)}
  .dhead .role{font-size:12px;color:var(--grey);margin-top:4px;line-height:1.4}
  .dhead .x{position:absolute;top:16px;right:18px;font-size:24px;color:var(--grey);cursor:pointer;line-height:1}
  .dbody{padding:6px 22px 34px;overflow-y:auto}
  .task{border:1px solid var(--line);border-left-width:4px;border-radius:9px;padding:12px 14px;margin-top:12px;background:#fff}
  .task .tt{font-weight:600;font-size:13.5px;display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
  .task .meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px;font-size:11px;align-items:center}
  .badge{border-radius:5px;padding:2px 8px;font-weight:600}
  .b-month{background:#fef3c7;color:#92400e}.b-owner{background:#f3f4f6;color:var(--ink)}
  .st{font-size:11px;font-weight:700;border-radius:5px;padding:2px 8px;white-space:nowrap}
  .st-done{background:#dcfce7;color:var(--done)}.st-prog{background:#dbeafe;color:var(--prog)}.st-wait{background:#f3f4f6;color:var(--wait)}
  .task .dep{font-size:11px;color:var(--grey);margin-top:8px;padding-top:7px;border-top:1px dashed var(--line)}
  .pill{font-size:10px;font-weight:700;border-radius:4px;padding:1px 6px;color:#fff}
  .pill1{background:var(--p1)}.pill2{background:var(--p2)}.pill3{background:var(--p3)}

  /* timeline (kept) */
  .mtl{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:0 0 14px;overflow-x:auto}
  .mtlgrid{min-width:max-content}
  .mhead{border-bottom:2px solid var(--navy);position:sticky;top:0;background:#fff;z-index:3}
  .mrow{border-bottom:1px solid #eef1f5}
  .mlane{padding:9px 12px;font-weight:600;font-size:12px;color:var(--navy);border-right:1px solid var(--line);display:flex;align-items:center;background:#fff}
  .pband{font-size:10px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center}
  .gbar{position:absolute;height:22px;border-radius:6px;top:9px;color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;padding:0 8px;cursor:pointer;white-space:nowrap;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.18);z-index:1}
  .gbar:hover{filter:brightness(1.1);z-index:5;overflow:visible}
  .legend2{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--grey);margin:12px 4px 0;align-items:center}
  .note{font-size:11.5px;color:var(--grey);margin:12px 2px 0;line-height:1.7}
  .note b{color:var(--navy)}
  footer{margin-top:22px;font-size:11px;color:var(--grey);text-align:center}
  @media print{.tabs,.drawer,.ctrlbtn{display:none}.view{display:block!important}.stage,.mtl{box-shadow:none}}
</style>
</head>

<div class="wrap">
  <header>
    <div>
      <h1>印尼国家医疗 AI 基础设施 · 区域项目看板</h1>

      <div class="ctrlbtn">
        <button id="btnPlay">⏸ 暂停</button>
        <button id="btnStep">▶ 单步</button>
      </div>
    </div>
    <div class="stage"><div id="liveSvgWrap"></div></div>
    <div class="note" id="liveNote"></div>
  </div>

  <!-- ===== IGNITION CHAIN (separate) ===== -->
  <div class="view" id="v-ign">
    <div class="stage" style="background:radial-gradient(120% 120% at 50% 0%,#2a1420 0%,#1a0d16 70%);border-color:#3a1a28"><div id="ignSvgWrap"></div></div>
    <div class="note" id="ignNote"></div>
  </div>

  <!-- ===== ACTION PLAN / SCHEDULE ===== -->
  <div class="view" id="v-plan">
    <div class="note" id="planIntro"></div>
    <div id="planWrap"></div>
  </div>

  <footer>Articura 区域项目看板　·　内部机密　·　2026</footer>
</div>

<div class="drawer" id="drawer">
  <div class="dhead"><span class="x" onclick="closeDrawer()">×</span><h2 id="dTitle"></h2><div class="role" id="dRole"></div></div>
  <div class="dbody" id="dBody"></div>
</div>

function edgePath(a,b){
  const x1=a.x, y1=a.y+a.h/2, x2=b.x, y2=b.y-b.h/2;
  if(Math.abs(x1-x2)<2){return `M ${x1} ${y1} L ${x2} ${y2}`;}
  const my=(y1+y2)/2;
  return `M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}`;
}

// wrap a subtitle into up to 2 lines if it's wider than the node
function wrapSub(text, wpx){
  const maxChars=Math.floor((wpx-14)/10.2); // ~10.2px per CJK char at 10px font
  if(text.length<=maxChars) return [text];
  // find a split point near the middle preferring separators
  let cut=-1; const seps=["·","（","("," ","→","/"];
  for(let i=Math.min(maxChars,text.length-1);i>maxChars/2;i--){ if(seps.includes(text[i])){cut=i;break;} }
  if(cut<0) cut=maxChars;
  return [text.slice(0,cut), text.slice(cut).replace(/^·/,"")];
}

function openPipe(pk){
  const d=PD[pk];if(!d)return;
  document.getElementById("dTitle").textContent=d.title;
  document.getElementById("dRole").textContent="预计："+d.when+"　·　状态："+stLabel[d.state];
  function taskRow(t,gi){
    const dot = t.st==="done"?"#16a34a":(t.st==="prog"?"#2563eb":"#9ca3af");
    const noteKey=pk+"__"+gi;
    const saved=(()=>{try{return localStorage.getItem("pipenote:"+noteKey)||"";}catch(e){return"";}})();
    return `<div class="task" style="border-left-color:${dot};margin-top:10px">
        <div class="tt"><span>${t.ms?"◆ ":""}${t.t}</span><span class="st st-${t.st}">${stLabel[t.st]}</span></div>
        <div class="meta"><span class="badge b-month">${t.when||""}</span>${t.owner?`<span class="badge b-owner">负责人：${t.owner}</span>`:""}</div>
        <div style="margin-top:8px">
          <div style="font-size:10.5px;color:#6b7280;margin-bottom:3px;display:flex;justify-content:space-between">
            <span>📝 状态 / 卡点备注</span><span class="notesaved" id="sv_${noteKey}" style="color:#16a34a;opacity:0"></span>
          </div>
          <textarea data-notekey="${noteKey}" placeholder="进度 / 卡点 / 下一步…"
            style="width:100%;min-height:40px;resize:vertical;border:1px solid var(--line);border-radius:7px;padding:7px 9px;font-size:12px;font-family:inherit;line-height:1.5;background:#fcfcfd;color:var(--ink)">${saved.replace(/</g,"&lt;")}</textarea>
        </div>
      </div>`;
  }
  // group by t.g if present
  const hasGroups=d.tasks.some(t=>t.g);
  let body="";
  if(d.note) body+=`<div style="font-size:12px;color:var(--navy);background:#f1f5fb;border-radius:8px;padding:9px 11px;margin:4px 0 6px;line-height:1.5">🎯 ${d.note}</div>`;
  body+=`<div style="font-size:11px;color:#9ca3af;margin:6px 0 10px;line-height:1.5">💾 备注保存在你本机浏览器（仅你可见），刷新后仍在，但不会同步给他人或其他设备。</div>`;
  if(hasGroups){
    const groups=[];const gmap={};
    d.tasks.forEach((t,idx)=>{const key=t.g||"Other";if(!gmap[key]){gmap[key]={name:key,items:[]};gmap[key]._i=groups.length;groups.push(gmap[key]);}gmap[key].items.push([t,idx]);});
    groups.forEach(gr=>{
      const done=gr.items.filter(([t])=>t.st==="done").length;
      body+=`<div style="margin-top:16px;margin-bottom:2px;font-size:13px;font-weight:700;color:var(--navy);border-bottom:2px solid var(--line);padding-bottom:5px;display:flex;justify-content:space-between">
        <span>${gr.name}</span><span style="font-size:10.5px;font-weight:500;color:#9ca3af">负责人：待定　·　${gr.items.length} 项</span></div>`;
      gr.items.forEach(([t,idx])=>{body+=taskRow(t,idx);});
    });
  } else {
    d.tasks.forEach((t,idx)=>{body+=taskRow(t,idx);});
  }
  document.getElementById("dBody").innerHTML=body;
  // wire autosave
  document.querySelectorAll("#dBody textarea[data-notekey]").forEach(ta=>{
    let tmr=null;
    ta.addEventListener("input",()=>{
      const k=ta.dataset.notekey;
      try{localStorage.setItem("pipenote:"+k,ta.value);}catch(e){}
      const sv=document.getElementById("sv_"+k);
      if(sv){sv.textContent="saved ✓";sv.style.opacity="1";clearTimeout(tmr);tmr=setTimeout(()=>{sv.style.opacity="0";},1200);}
    });
  });
  drawer.classList.add("open");
}

function ignPath(a,b){
  let x1=a.x,y1=a.y+a.h/2,x2=b.x,y2=b.y-b.h/2;
  const sideways = Math.abs(a.y-b.y) < (a.h/2+b.h/2+20) && Math.abs(a.x-b.x) > (a.w/2+b.w/2-10);
  if(b.y<a.y-5){ // upward (loop)
    x1=a.x+(b.x>a.x?a.w/2:-a.w/2); y1=a.y-a.h/4; x2=b.x+(b.x>a.x?-b.w/2:b.w/2); y2=b.y+b.h/4;
    const mx=(x1+x2)/2; return `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`;
  }
  if(sideways){
    x1=a.x+(x2>a.x?a.w/2:-a.w/2); y1=a.y; x2=b.x+(x2>a.x?-b.w/2:b.w/2); y2=b.y;
    return `M ${x1} ${y1} L ${x2} ${y2}`;
  }
  const my=(y1+y2)/2;
  return `M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}`;
}
function diamondPts(n){const cx=n.x,cy=n.y,hw=n.w/2,hh=n.h/2;return `${cx},${cy-hh} ${cx+hw},${cy} ${cx},${cy+hh} ${cx-hw},${cy}`;}
